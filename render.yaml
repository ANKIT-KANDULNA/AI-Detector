services:
  - type: web
    name: ai-detector-backend
    env: python
    plan: free
    region: oregon
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:10000
